name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Clone djvu-rs
        run: git clone https://github.com/matyushkin/djvu-rs /tmp/djvu-rs

      - name: Build WASM
        run: npm run build:wasm
        env:
          DJVU_RS_PATH: /tmp/djvu-rs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify artifacts
        run: |
          test -f main.js   || (echo "main.js missing"   && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)
          test -f styles.css    || (echo "styles.css missing"    && exit 1)
          echo "main.js size: $(du -sh main.js | cut -f1)"
